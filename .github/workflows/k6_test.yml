name: K6 Performance Test

on:
  push:
    branches: [ main, master ]

jobs:
  k6_test:
    name: Run k6 Load Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # PASO CLAVE: Instalar Chromium y dependencias en el Runner
      - name: Instalar Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Ejecutar k6 browser test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: scripts/07_k6_browser.js
          # Le decimos a k6 dónde está el binario de Chromium instalado
          flags: --env K6_BROWSER_EXECUTABLE_PATH=/usr/bin/chromium-browser

      - name: Subir Reporte HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-report
          path: summary.html