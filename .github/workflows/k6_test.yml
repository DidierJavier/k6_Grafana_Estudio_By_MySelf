name: K6 Performance Test

on:
  push:
    branches: [ main, master ]

jobs:
  k6_test:
    name: Run k6 Load Test
    runs-on: ubuntu-latest
    # AQUÍ ESTÁ EL TRUCO SENIOR: Usar la imagen oficial que ya tiene k6 y Chromium
    container:
      image: grafana/k6:latest-with-browser

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Ejecutar k6 test
        # Al estar dentro del contenedor, usamos k6 directamente
        run: k6 run scripts/07_k6_browser.js

      - name: Subir Reporte HTML
        uses: actions/upload-artifact@v4
        if: always() # Para que suba el reporte incluso si el test falla
        with:
          name: k6-report
          path: summary.html